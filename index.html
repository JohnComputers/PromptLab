<style>
/* ============================================================
   PROMPTLAB — DESIGN SYSTEM
   Palette + tokens from PRD. Premium light-blue SaaS aesthetic.
   ============================================================ */
:root{
  --blue:#4DA3FF; --blue-2:#82C8FF; --blue-ink:#1F6FD6; --blue-deep:#0E5BC4;
  --bg:#F8FBFF; --bg-2:#EEF6FF; --surface:#FFFFFF; --card:#FFFFFF;
  --text:#1E293B; --muted:#5B6B7F; --faint:#8497AB; --line:#E4EEF9; --line-2:#D6E6F7;
  --success:#22C55E; --warning:#F59E0B; --danger:#EF4444;
  --r-btn:14px; --r-card:20px; --r-input:14px; --r-modal:24px; --r-pill:999px;
  --sh1:0 1px 2px rgba(20,52,96,.06), 0 4px 14px rgba(20,52,96,.05);
  --sh2:0 6px 16px rgba(20,52,96,.10), 0 14px 40px rgba(20,52,96,.10);
  --sh3:0 18px 50px rgba(13,52,110,.20), 0 4px 12px rgba(13,52,110,.10);
  --glow:0 0 0 4px rgba(77,163,255,.16);
  --maxw:1280px;
  --nav-h:68px;
  --font:'Inter','Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;
  --ease:cubic-bezier(.22,.61,.36,1);
}
[data-theme="dark"]{
  --bg:#0D1117; --bg-2:#0B1320; --surface:#161B22; --card:#21262D;
  --text:#F2F5F8; --muted:#9FB0C2; --faint:#6E7F92; --line:#2A323F; --line-2:#333D4C;
  --sh1:0 1px 2px rgba(0,0,0,.4), 0 6px 18px rgba(0,0,0,.35);
  --sh2:0 8px 22px rgba(0,0,0,.45), 0 18px 50px rgba(0,0,0,.4);
  --sh3:0 22px 60px rgba(0,0,0,.6);
  --glow:0 0 0 4px rgba(77,163,255,.22);
}
*{box-sizing:border-box}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{
  margin:0;font-family:var(--font);color:var(--text);
  background:
    radial-gradient(1200px 600px at 80% -10%, rgba(130,200,255,.20), transparent 60%),
    radial-gradient(900px 500px at -10% 10%, rgba(77,163,255,.12), transparent 55%),
    linear-gradient(180deg, var(--bg), var(--bg));
  background-attachment:fixed;
  line-height:1.6;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
  overflow-x:hidden;
}
a{color:inherit;text-decoration:none}
img{max-width:100%;display:block}
button{font-family:inherit}
::selection{background:rgba(77,163,255,.28)}
.container{width:100%;max-width:var(--maxw);margin:0 auto;padding:0 24px}

/* Typography */
h1,h2,h3,h4{margin:0;line-height:1.1;letter-spacing:-.02em;font-weight:800}
h1{font-size:clamp(2.3rem,5.2vw,3.9rem);font-weight:900;letter-spacing:-.035em}
h2{font-size:clamp(1.7rem,3.4vw,2.6rem)}
h3{font-size:clamp(1.15rem,2vw,1.4rem)}
p{margin:0 0 1rem}
.eyebrow{display:inline-flex;align-items:center;gap:8px;font-size:.74rem;font-weight:700;
  letter-spacing:.14em;text-transform:uppercase;color:var(--blue-ink)}
.lead{font-size:clamp(1.02rem,1.6vw,1.22rem);color:var(--muted);font-weight:450}
.muted{color:var(--muted)}
.center{text-align:center}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:9px;cursor:pointer;
  border:1px solid transparent;border-radius:var(--r-btn);font-weight:650;font-size:.95rem;
  padding:12px 20px;min-height:46px;transition:transform .16s var(--ease), box-shadow .2s var(--ease), background .2s, border-color .2s, color .2s;
  white-space:nowrap;user-select:none}
.btn svg{width:18px;height:18px}
.btn:active{transform:scale(.97)}
.btn-primary{background:linear-gradient(180deg,var(--blue),var(--blue-ink));color:#fff;box-shadow:var(--sh1),0 6px 18px rgba(77,163,255,.35)}
.btn-primary:hover{transform:translateY(-2px) scale(1.02);box-shadow:var(--sh2),0 10px 26px rgba(77,163,255,.45)}
.btn-secondary{background:var(--surface);color:var(--blue-ink);border-color:var(--line-2)}
.btn-secondary:hover{transform:translateY(-2px);border-color:var(--blue);box-shadow:var(--sh1)}
.btn-ghost{background:transparent;color:var(--text);padding:10px 14px;min-height:42px}
.btn-ghost:hover{color:var(--blue-ink)}
.btn-danger{background:var(--danger);color:#fff}
.btn-danger:hover{filter:brightness(1.06);transform:translateY(-1px)}
.btn-success{background:var(--success);color:#fff}
.btn-success:hover{filter:brightness(1.05);transform:translateY(-1px)}
.btn-sm{padding:8px 14px;min-height:38px;font-size:.86rem;border-radius:11px}
.btn-lg{padding:15px 28px;min-height:54px;font-size:1.02rem}
.btn-block{width:100%}
.btn[disabled]{opacity:.55;cursor:not-allowed;transform:none!important}

/* Badges & pills */
.badge{display:inline-flex;align-items:center;gap:6px;font-size:.72rem;font-weight:700;
  padding:4px 10px;border-radius:var(--r-pill);background:var(--bg-2);color:var(--blue-ink);border:1px solid var(--line)}
.badge.solid{background:linear-gradient(180deg,var(--blue),var(--blue-ink));color:#fff;border-color:transparent}
.badge.price{background:rgba(34,197,94,.12);color:#15803d;border-color:rgba(34,197,94,.25)}
[data-theme="dark"] .badge.price{color:#5fe39a}
.badge.diff-easy{background:rgba(34,197,94,.12);color:#16a34a;border-color:transparent}
.badge.diff-medium{background:rgba(245,158,11,.14);color:#b45309;border-color:transparent}
.badge.diff-hard{background:rgba(239,68,68,.12);color:#dc2626;border-color:transparent}
[data-theme="dark"] .badge.diff-easy{color:#4ade80}
[data-theme="dark"] .badge.diff-medium{color:#fbbf24}
[data-theme="dark"] .badge.diff-hard{color:#f87171}

/* Cards */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r-card);box-shadow:var(--sh1)}

/* ====================== NAVBAR ====================== */
.nav{position:sticky;top:0;z-index:60;height:var(--nav-h);
  backdrop-filter:saturate(160%) blur(14px);-webkit-backdrop-filter:saturate(160%) blur(14px);
  background:color-mix(in srgb, var(--surface) 78%, transparent);
  border-bottom:1px solid transparent;transition:border-color .25s, box-shadow .25s, background .25s}
.nav.scrolled{border-bottom-color:var(--line);box-shadow:0 6px 24px rgba(20,52,96,.06)}
.nav-inner{display:flex;align-items:center;gap:18px;height:100%}
.brand{display:flex;align-items:center;gap:11px;font-weight:900;font-size:1.18rem;letter-spacing:-.03em;flex-shrink:0}
.brand .logo{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;
  background:linear-gradient(135deg,var(--blue),var(--blue-deep));color:#fff;box-shadow:0 6px 16px rgba(77,163,255,.4)}
.brand .logo svg{width:20px;height:20px}
.nav-links{display:flex;align-items:center;gap:4px;margin:0 auto}
.nav-link{position:relative;padding:8px 13px;border-radius:10px;color:var(--muted);font-weight:550;font-size:.92rem;
  transition:color .2s}
.nav-link:hover{color:var(--text)}
.nav-link.active{color:var(--blue-ink)}
.nav-link::after{content:"";position:absolute;left:13px;right:13px;bottom:4px;height:2px;border-radius:2px;
  background:var(--blue);transform:scaleX(0);transform-origin:left;transition:transform .26s var(--ease)}
.nav-link:hover::after,.nav-link.active::after{transform:scaleX(1)}
.nav-actions{display:flex;align-items:center;gap:8px;flex-shrink:0}
.icon-btn{width:42px;height:42px;border-radius:12px;border:1px solid var(--line);background:var(--surface);
  display:grid;place-items:center;cursor:pointer;color:var(--text);position:relative;transition:.18s var(--ease)}
.icon-btn:hover{border-color:var(--blue);color:var(--blue-ink);transform:translateY(-1px);box-shadow:var(--sh1)}
.icon-btn svg{width:19px;height:19px}
.cart-count{position:absolute;top:-5px;right:-5px;min-width:18px;height:18px;padding:0 4px;border-radius:9px;
  background:var(--danger);color:#fff;font-size:.66rem;font-weight:800;display:grid;place-items:center}
.hamburger{display:none}

/* mobile drawer */
.drawer-backdrop{position:fixed;inset:0;background:rgba(8,20,40,.5);backdrop-filter:blur(3px);z-index:80;opacity:0;pointer-events:none;transition:opacity .3s}
.drawer-backdrop.open{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;right:0;height:100%;width:min(86vw,360px);background:var(--surface);z-index:90;
  transform:translateX(102%);transition:transform .34s var(--ease);box-shadow:var(--sh3);
  display:flex;flex-direction:column;padding:18px;overflow-y:auto}
.drawer.open{transform:translateX(0)}
.drawer .nav-link{display:block;padding:14px 12px;font-size:1.05rem;border-radius:12px}
.drawer .nav-link::after{display:none}
.drawer .nav-link:hover{background:var(--bg-2)}
.drawer-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}

/* ====================== SECTIONS ====================== */
main{display:block;min-height:60vh}
.section{padding:84px 0}
.section.tight{padding:56px 0}
.section-head{max-width:680px;margin:0 auto 44px;text-align:center}
.section-head .lead{margin-top:14px}
.section-head.left{margin-left:0;text-align:left}

/* ====================== HERO ====================== */
.hero{position:relative;padding:64px 0 56px;overflow:hidden}
.hero-grid{display:grid;grid-template-columns:1.05fr .95fr;gap:48px;align-items:center}
.hero-copy h1{margin-bottom:18px}
.hero-copy .lead{max-width:560px;margin-bottom:30px}
.hero-cta{display:flex;flex-wrap:wrap;gap:14px;align-items:center}
.hero-tertiary{color:var(--blue-ink);font-weight:650;display:inline-flex;gap:6px;align-items:center;padding:8px 4px}
.hero-tertiary:hover{gap:10px}
.hero-tertiary svg{width:16px;height:16px;transition:transform .2s}
.hero-stats{display:flex;gap:26px;margin-top:38px;flex-wrap:wrap}
.hero-stat .n{font-size:1.6rem;font-weight:900;letter-spacing:-.03em}
.hero-stat .l{font-size:.8rem;color:var(--muted);font-weight:550}
.hero-wave{position:absolute;inset:-20% -10% auto -10%;height:120%;z-index:-1;pointer-events:none;opacity:.6;
  background:conic-gradient(from 120deg at 70% 25%, rgba(130,200,255,.0), rgba(77,163,255,.22), rgba(130,200,255,.0));
  filter:blur(40px);animation:waveDrift 16s ease-in-out infinite alternate}
@keyframes waveDrift{from{transform:translate3d(-3%,0,0) rotate(0deg)}to{transform:translate3d(4%,2%,0) rotate(6deg)}}

/* hero mockup — floating prompt cards (signature element) */
.hero-stage{position:relative;height:440px;perspective:1200px}
.float-card{position:absolute;width:300px;background:var(--card);border:1px solid var(--line);border-radius:18px;
  box-shadow:var(--sh2);padding:16px 18px;will-change:transform}
.float-card .fc-top{display:flex;align-items:center;gap:9px;margin-bottom:10px}
.float-card .fc-dot{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,var(--blue),var(--blue-deep));display:grid;place-items:center;color:#fff;flex-shrink:0}
.float-card .fc-dot svg{width:16px;height:16px}
.float-card .fc-title{font-weight:750;font-size:.92rem}
.float-card .fc-cat{font-size:.7rem;color:var(--muted)}
.float-card .fc-body{font-size:.82rem;color:var(--muted);line-height:1.5}
.float-card .fc-var{color:var(--blue-ink);font-weight:650;background:rgba(77,163,255,.1);padding:1px 5px;border-radius:6px}
.float-card .fc-foot{display:flex;align-items:center;justify-content:space-between;margin-top:12px}
.fc-1{top:6%;left:2%;animation:floaty 7s ease-in-out infinite}
.fc-2{top:33%;right:-2%;animation:floaty 8.5s ease-in-out infinite reverse;z-index:3}
.fc-3{bottom:2%;left:14%;animation:floaty 9.5s ease-in-out infinite .4s}
@keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-16px)}}
.hero-orb{position:absolute;width:200px;height:200px;border-radius:50%;
  background:radial-gradient(circle,rgba(77,163,255,.5),transparent 65%);filter:blur(26px);top:30%;left:30%;z-index:0}

/* ====================== TRUST STRIP ====================== */
.trust{border-top:1px solid var(--line);border-bottom:1px solid var(--line);
  background:color-mix(in srgb,var(--surface) 60%, transparent)}
.trust-inner{display:flex;align-items:center;justify-content:center;gap:14px 38px;flex-wrap:wrap;padding:22px 0}
.trust-inner .t-label{font-size:.82rem;color:var(--muted);font-weight:600}
.trust-logos{display:flex;gap:26px;flex-wrap:wrap;opacity:.7}
.trust-logos span{font-weight:800;letter-spacing:-.02em;color:var(--faint);font-size:1.05rem}

/* ====================== GRIDS ====================== */
.grid{display:grid;gap:20px}
.cols-4{grid-template-columns:repeat(4,1fr)}
.cols-3{grid-template-columns:repeat(3,1fr)}
.cols-2{grid-template-columns:repeat(2,1fr)}

/* category card */
.cat-card{padding:22px;cursor:pointer;transition:transform .2s var(--ease),box-shadow .25s,border-color .2s;
  display:flex;flex-direction:column;gap:12px;background:var(--card);border:1px solid var(--line);border-radius:var(--r-card)}
.cat-card:hover{transform:translateY(-5px);box-shadow:var(--sh2);border-color:var(--line-2)}
.cat-ico{width:46px;height:46px;border-radius:13px;display:grid;place-items:center;
  background:linear-gradient(135deg,rgba(77,163,255,.16),rgba(130,200,255,.16));color:var(--blue-ink)}
.cat-ico svg{width:23px;height:23px}
.cat-card h3{font-size:1.06rem}
.cat-card p{font-size:.86rem;color:var(--muted);margin:0}
.cat-card .cat-go{margin-top:auto;color:var(--blue-ink);font-weight:650;font-size:.84rem;display:inline-flex;gap:6px;align-items:center}

/* prompt card */
.p-card{display:flex;flex-direction:column;gap:12px;padding:20px;cursor:pointer;position:relative;
  background:var(--card);border:1px solid var(--line);border-radius:var(--r-card);box-shadow:var(--sh1);
  transition:transform .2s var(--ease),box-shadow .25s,border-color .2s}
.p-card:hover{transform:translateY(-5px);box-shadow:var(--sh2);border-color:var(--blue)}
.p-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.p-card h3{font-size:1.04rem;line-height:1.25}
.p-tags{display:flex;gap:6px;flex-wrap:wrap}
.p-snippet{font-size:.86rem;color:var(--muted);margin:0;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.p-vars{display:flex;gap:6px;flex-wrap:wrap}
.var-chip{font-size:.7rem;font-weight:650;color:var(--blue-ink);background:rgba(77,163,255,.1);padding:2px 8px;border-radius:7px}
.p-foot{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:4px;padding-top:14px;border-top:1px solid var(--line)}
.p-actions{display:flex;gap:8px;opacity:1;transition:opacity .2s}
.p-meta{display:flex;align-items:center;gap:8px}
.ai-dots{display:flex;gap:4px}
.ai-dot{font-size:.66rem;font-weight:700;color:var(--faint);background:var(--bg-2);padding:1px 6px;border-radius:6px}

/* pack card */
.pack-card{display:flex;flex-direction:column;gap:14px;padding:24px;position:relative;overflow:hidden;
  background:var(--card);border:1px solid var(--line);border-radius:var(--r-card);box-shadow:var(--sh1);
  transition:transform .2s var(--ease),box-shadow .25s,border-color .25s}
.pack-card::before{content:"";position:absolute;inset:0;border-radius:inherit;padding:1px;opacity:0;transition:opacity .3s;
  background:linear-gradient(135deg,var(--blue),var(--blue-2));-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude}
.pack-card:hover{transform:translateY(-6px);box-shadow:var(--sh3)}
.pack-card:hover::before{opacity:1}
.pack-card .pk-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.pack-card h3{font-size:1.2rem}
.pk-count{font-size:.78rem;color:var(--muted);font-weight:600}
.pk-desc{font-size:.9rem;color:var(--muted);margin:0;flex:1}
.pk-price{font-size:1.9rem;font-weight:900;letter-spacing:-.03em}
.pk-price small{font-size:.8rem;font-weight:600;color:var(--muted)}
.pk-foot{display:flex;gap:10px;align-items:center}

/* how it works */
.steps{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;counter-reset:step}
.step{padding:28px;text-align:left;background:var(--card);border:1px solid var(--line);border-radius:var(--r-card);position:relative}
.step .s-num{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,var(--blue),var(--blue-deep));
  color:#fff;display:grid;place-items:center;font-weight:900;font-size:1.1rem;margin-bottom:16px;box-shadow:0 6px 16px rgba(77,163,255,.35)}
.step h3{margin-bottom:8px}
.step p{font-size:.9rem;color:var(--muted);margin:0}

/* split blocks */
.split{display:grid;grid-template-columns:1.1fr .9fr;gap:40px;align-items:center}
.panel{padding:40px;background:linear-gradient(135deg,rgba(77,163,255,.08),rgba(130,200,255,.05));
  border:1px solid var(--line-2);border-radius:var(--r-card)}
[data-theme="dark"] .panel{background:linear-gradient(135deg,rgba(77,163,255,.1),rgba(20,40,70,.3))}

/* testimonials */
.t-track-wrap{overflow:hidden;position:relative;-webkit-mask:linear-gradient(90deg,transparent,#000 6%,#000 94%,transparent)}
.t-track{display:flex;gap:20px;width:max-content;animation:marquee 38s linear infinite}
.t-track-wrap:hover .t-track{animation-play-state:paused}
@keyframes marquee{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.t-card{width:360px;padding:24px;background:var(--card);border:1px solid var(--line);border-radius:var(--r-card);box-shadow:var(--sh1)}
.t-stars{color:#f5b301;letter-spacing:2px;font-size:.9rem;margin-bottom:10px}
.t-quote{font-size:.95rem;margin-bottom:16px}
.t-who{display:flex;align-items:center;gap:12px}
.t-av{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--blue-deep));color:#fff;
  display:grid;place-items:center;font-weight:800}
.t-name{font-weight:700;font-size:.9rem}
.t-role{font-size:.78rem;color:var(--muted)}

/* pricing strip */
.price-strip{display:grid;grid-template-columns:1fr 1fr;gap:20px;max-width:760px;margin:0 auto}
.price-box{padding:34px;text-align:center;background:var(--card);border:1px solid var(--line);border-radius:var(--r-card);box-shadow:var(--sh1)}
.price-box.feat{border-color:var(--blue);box-shadow:var(--sh2),0 0 0 1px var(--blue)}
.price-box .pb-amt{font-size:3rem;font-weight:900;letter-spacing:-.04em;margin:8px 0}
.price-box .pb-amt small{font-size:1rem;font-weight:600;color:var(--muted)}

/* owners */
.owners{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;max-width:760px;margin:0 auto}
.owner{padding:26px;display:flex;gap:16px;align-items:center;background:var(--card);border:1px solid var(--line);border-radius:var(--r-card)}
.owner .o-av{width:64px;height:64px;border-radius:18px;background:linear-gradient(135deg,var(--blue),var(--blue-deep));color:#fff;
  display:grid;place-items:center;font-weight:800;font-size:1.4rem;flex-shrink:0}
.owner h3{font-size:1.1rem}
.owner .o-role{color:var(--blue-ink);font-weight:600;font-size:.86rem}
.owner .o-mail{color:var(--muted);font-size:.84rem}

/* FAQ accordion */
.faq-list{max-width:760px;margin:0 auto;display:flex;flex-direction:column;gap:12px}
.faq-item{background:var(--card);border:1px solid var(--line);border-radius:16px;overflow:hidden;transition:border-color .2s}
.faq-item.open{border-color:var(--blue)}
.faq-q{width:100%;text-align:left;padding:18px 22px;background:none;border:none;cursor:pointer;
  font-weight:650;font-size:1rem;color:var(--text);display:flex;align-items:center;justify-content:space-between;gap:14px}
.faq-q .chev{width:20px;height:20px;transition:transform .25s var(--ease);color:var(--blue-ink);flex-shrink:0}
.faq-item.open .chev{transform:rotate(180deg)}
.faq-a{max-height:0;overflow:hidden;transition:max-height .32s var(--ease)}
.faq-a-inner{padding:0 22px 20px;color:var(--muted);font-size:.92rem}

/* final cta */
.final-cta{text-align:center;padding:64px 40px;border-radius:28px;position:relative;overflow:hidden;
  background:linear-gradient(135deg,var(--blue),var(--blue-deep));color:#fff;box-shadow:var(--sh3)}
.final-cta::after{content:"";position:absolute;inset:0;opacity:.4;
  background:radial-gradient(600px 300px at 20% 0%,rgba(255,255,255,.3),transparent 60%)}
.final-cta h2,.final-cta p{position:relative;z-index:1;color:#fff}
.final-cta .lead{color:rgba(255,255,255,.9)}
.final-cta .hero-cta{position:relative;z-index:1;justify-content:center;margin-top:26px}
.final-cta .btn-primary{background:#fff;color:var(--blue-ink);box-shadow:var(--sh2)}
.final-cta .btn-secondary{background:rgba(255,255,255,.12);color:#fff;border-color:rgba(255,255,255,.3)}

/* ====================== FOOTER ====================== */
.footer{border-top:1px solid var(--line);background:color-mix(in srgb,var(--surface) 70%, transparent);margin-top:40px}
.footer-top{display:grid;grid-template-columns:1.4fr repeat(3,1fr);gap:36px;padding:56px 0 40px}
.footer-brand .brand{margin-bottom:14px}
.footer-brand p{font-size:.88rem;color:var(--muted);max-width:300px}
.footer-col h4{font-size:.78rem;text-transform:uppercase;letter-spacing:.1em;color:var(--faint);margin-bottom:14px}
.footer-col a{display:block;padding:5px 0;font-size:.9rem;color:var(--muted);transition:color .18s}
.footer-col a:hover{color:var(--blue-ink)}
.socials{display:flex;gap:10px;margin-top:16px}
.soc{width:38px;height:38px;border-radius:11px;border:1px solid var(--line);display:grid;place-items:center;color:var(--muted);transition:.18s}
.soc:hover{border-color:var(--blue);color:var(--blue-ink);transform:translateY(-2px)}
.soc svg{width:18px;height:18px}
.footer-bottom{border-top:1px solid var(--line);padding:20px 0;display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:10px;font-size:.82rem;color:var(--muted)}
.ver-tag{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:.74rem;color:var(--faint)}

/* ====================== BROWSE / MARKETPLACE ====================== */
.browse-head{padding:36px 0 8px}
.search-bar-wrap{position:sticky;top:var(--nav-h);z-index:40;padding:14px 0;
  background:color-mix(in srgb,var(--bg) 86%, transparent);backdrop-filter:blur(10px)}
.search-bar{position:relative;max-width:640px}
.search-bar input{width:100%;padding:14px 16px 14px 46px;border-radius:var(--r-input);border:1px solid var(--line-2);
  background:var(--surface);color:var(--text);font-size:.98rem;transition:.2s}
.search-bar input:focus{outline:none;border-color:var(--blue);box-shadow:var(--glow)}
.search-bar .s-ico{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--faint);width:19px;height:19px}
.search-suggest{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--surface);border:1px solid var(--line);
  border-radius:14px;box-shadow:var(--sh2);overflow:hidden;z-index:5}
.search-suggest button{width:100%;text-align:left;padding:11px 16px;background:none;border:none;cursor:pointer;color:var(--text);font-size:.9rem;display:flex;gap:10px;align-items:center}
.search-suggest button:hover{background:var(--bg-2)}
.search-suggest .ss-cat{font-size:.72rem;color:var(--faint);margin-left:auto}

.browse-layout{display:grid;grid-template-columns:264px 1fr;gap:32px;align-items:start;padding-bottom:60px}
.filters{position:sticky;top:calc(var(--nav-h) + 72px);background:var(--card);border:1px solid var(--line);
  border-radius:var(--r-card);padding:20px;box-shadow:var(--sh1)}
.filter-group{padding:14px 0;border-bottom:1px solid var(--line)}
.filter-group:last-child{border-bottom:none;padding-bottom:0}
.filter-group:first-child{padding-top:0}
.filter-group h4{font-size:.82rem;text-transform:uppercase;letter-spacing:.08em;color:var(--faint);margin-bottom:12px}
.check{display:flex;align-items:center;gap:10px;padding:5px 0;cursor:pointer;font-size:.9rem;color:var(--text)}
.check input{width:17px;height:17px;accent-color:var(--blue);cursor:pointer}
.check .ct{flex:1}
.check .cn{font-size:.76rem;color:var(--faint)}
.range-row{display:flex;align-items:center;gap:10px;font-size:.84rem;color:var(--muted)}
input[type=range]{width:100%;accent-color:var(--blue)}
.filter-reset{margin-top:16px;width:100%}

.browse-toolbar{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:18px;flex-wrap:wrap}
.result-count{font-size:.9rem;color:var(--muted);font-weight:550}
.result-count b{color:var(--text)}
.sort-select{display:flex;align-items:center;gap:8px}
select{padding:9px 14px;border-radius:11px;border:1px solid var(--line-2);background:var(--surface);color:var(--text);
  font-size:.88rem;font-weight:550;cursor:pointer}
select:focus{outline:none;border-color:var(--blue)}
.mobile-filter-btn{display:none}

.browse-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.skeleton{background:var(--card);border:1px solid var(--line);border-radius:var(--r-card);padding:20px;display:flex;flex-direction:column;gap:12px}
.sk-line{height:12px;border-radius:6px;background:linear-gradient(90deg,var(--line),var(--bg-2),var(--line));
  background-size:200% 100%;animation:shimmer 1.3s infinite}
@keyframes shimmer{from{background-position:200% 0}to{background-position:-200% 0}}
.sk-line.lg{height:18px;width:70%}.sk-line.sm{width:40%}

.empty-state{text-align:center;padding:64px 20px;grid-column:1/-1}
.empty-state .es-ico{width:64px;height:64px;border-radius:18px;background:var(--bg-2);display:grid;place-items:center;margin:0 auto 18px;color:var(--faint)}
.empty-state h3{margin-bottom:8px}
.empty-state p{color:var(--muted);margin-bottom:18px}

.load-more-sentinel{grid-column:1/-1;display:grid;place-items:center;padding:24px}
.spinner{width:28px;height:28px;border:3px solid var(--line);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* mobile filter sheet */
.sheet-backdrop{position:fixed;inset:0;background:rgba(8,20,40,.5);z-index:80;opacity:0;pointer-events:none;transition:.3s}
.sheet-backdrop.open{opacity:1;pointer-events:auto}
.sheet{position:fixed;bottom:0;left:0;right:0;max-height:84vh;background:var(--surface);z-index:85;border-radius:24px 24px 0 0;
  transform:translateY(102%);transition:transform .34s var(--ease);box-shadow:var(--sh3);display:flex;flex-direction:column}
.sheet.open{transform:translateY(0)}
.sheet-grip{width:40px;height:4px;border-radius:2px;background:var(--line-2);margin:12px auto 4px}
.sheet-body{padding:8px 22px;overflow-y:auto}
.sheet-foot{padding:14px 22px;border-top:1px solid var(--line)}

/* breadcrumbs */
.crumbs{display:flex;align-items:center;gap:8px;font-size:.84rem;color:var(--muted);padding:24px 0 0;flex-wrap:wrap}
.crumbs a:hover{color:var(--blue-ink)}
.crumbs .sep{color:var(--faint)}
.crumbs .cur{color:var(--text);font-weight:600}

/* ====================== PROMPT DETAIL ====================== */
.detail-grid{display:grid;grid-template-columns:1fr 340px;gap:32px;align-items:start;padding:24px 0 64px}
.detail-head{display:flex;flex-direction:column;gap:14px;margin-bottom:24px}
.detail-head h1{font-size:clamp(1.8rem,3.4vw,2.5rem)}
.detail-badges{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.viewer{background:var(--card);border:1px solid var(--line);border-radius:var(--r-card);overflow:hidden;box-shadow:var(--sh1);margin-bottom:24px}
.viewer-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--line);background:var(--bg-2)}
.viewer-head .vh-title{font-weight:700;font-size:.9rem;display:flex;align-items:center;gap:8px;color:var(--muted)}
.viewer-body{padding:22px;font-size:.96rem;line-height:1.7;white-space:pre-wrap;word-break:break-word;font-family:var(--font)}
.viewer-body .vv{color:var(--blue-ink);font-weight:700;background:rgba(77,163,255,.12);padding:1px 6px;border-radius:7px;cursor:pointer;transition:background .15s}
.viewer-body .vv.filled{background:rgba(34,197,94,.14);color:#15803d}
[data-theme="dark"] .viewer-body .vv.filled{color:#5fe39a}

.var-engine{background:var(--card);border:1px solid var(--line);border-radius:var(--r-card);padding:22px;margin-bottom:24px}
.var-engine-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;gap:12px;flex-wrap:wrap}
.var-engine-head h3{font-size:1.05rem;display:flex;align-items:center;gap:9px}
.toggle{display:inline-flex;align-items:center;gap:9px;cursor:pointer;font-size:.84rem;font-weight:600;color:var(--muted);user-select:none}
.toggle .tg{width:42px;height:24px;border-radius:12px;background:var(--line-2);position:relative;transition:.2s}
.toggle .tg::after{content:"";position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#fff;transition:.22s var(--ease);box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle.on .tg{background:var(--blue)}
.toggle.on .tg::after{transform:translateX(18px)}
.var-fields{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:16px}
.field label{display:block;font-size:.8rem;font-weight:650;margin-bottom:6px;color:var(--text)}
.field input,.field textarea,.field select{width:100%;padding:11px 14px;border-radius:var(--r-input);border:1px solid var(--line-2);
  background:var(--surface);color:var(--text);font-size:.92rem;font-family:inherit;transition:.18s}
.field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--blue);box-shadow:var(--glow)}
.field textarea{resize:vertical;min-height:96px}
.field .err{color:var(--danger);font-size:.76rem;margin-top:5px;display:none}
.field.invalid .err{display:block}
.field.invalid input,.field.invalid textarea{border-color:var(--danger)}

.output-box{background:var(--bg-2);border:1px dashed var(--line-2);border-radius:14px;padding:18px;font-size:.9rem;
  line-height:1.65;color:var(--muted);max-height:280px;overflow-y:auto;white-space:pre-wrap}

.buy-panel{position:sticky;top:calc(var(--nav-h) + 20px);background:var(--card);border:1px solid var(--line);
  border-radius:var(--r-card);padding:24px;box-shadow:var(--sh2)}
.buy-price{font-size:2.6rem;font-weight:900;letter-spacing:-.04em;margin-bottom:4px}
.buy-price small{font-size:.9rem;font-weight:600;color:var(--muted)}
.buy-panel .secure{display:flex;align-items:center;gap:8px;font-size:.8rem;color:var(--muted);margin-top:14px;justify-content:center}
.buy-custom{margin-top:14px;padding-top:14px;border-top:1px solid var(--line);text-align:center;font-size:.84rem;color:var(--muted)}
.buy-custom a{color:var(--blue-ink);font-weight:600;text-decoration:none}
.buy-custom a:hover{text-decoration:underline}
.buy-panel .secure svg{width:15px;height:15px;color:var(--success)}
.buy-incl{margin:18px 0;padding:16px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line);display:flex;flex-direction:column;gap:9px}
.buy-incl li{display:flex;gap:9px;align-items:flex-start;font-size:.86rem;color:var(--text);list-style:none}
.buy-incl li svg{width:16px;height:16px;color:var(--success);flex-shrink:0;margin-top:2px}
.buy-incl ul{margin:0;padding:0}

.related{padding:24px 0 64px}

/* ====================== FORMS / GENERIC PAGES ====================== */
.form-card{max-width:720px;margin:0 auto;background:var(--card);border:1px solid var(--line);border-radius:var(--r-card);
  padding:32px;box-shadow:var(--sh1)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-field{margin-bottom:16px}
.req{color:var(--danger)}
.prose{max-width:760px;margin:0 auto}
.prose h2{margin:32px 0 12px;font-size:1.4rem}
.prose h3{margin:24px 0 8px}
.prose p,.prose li{color:var(--muted);font-size:.95rem}
.prose ul{padding-left:20px}
.prose a{color:var(--blue-ink);text-decoration:underline}
.legal-meta{font-size:.82rem;color:var(--faint);margin-bottom:24px}

.contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:32px;align-items:start}
.contact-info{display:flex;flex-direction:column;gap:18px}
.ci-item{display:flex;gap:14px;align-items:flex-start;padding:18px;background:var(--card);border:1px solid var(--line);border-radius:16px}
.ci-item .ci-ico{width:42px;height:42px;border-radius:12px;background:rgba(77,163,255,.12);color:var(--blue-ink);display:grid;place-items:center;flex-shrink:0}
.ci-item h4{font-size:.95rem;margin-bottom:3px}
.ci-item p{font-size:.86rem;color:var(--muted);margin:0}

/* success page */
.success-wrap{max-width:580px;margin:0 auto;text-align:center;padding:40px 0}
.success-ico{width:84px;height:84px;border-radius:50%;background:rgba(34,197,94,.14);color:var(--success);
  display:grid;place-items:center;margin:0 auto 24px;animation:pop .5s var(--ease)}
.success-ico svg{width:44px;height:44px}
@keyframes pop{0%{transform:scale(.5);opacity:0}60%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}

/* pricing page tiers */
.tiers{display:grid;grid-template-columns:repeat(3,1fr);gap:22px;max-width:1000px;margin:0 auto}
.tier{padding:32px;background:var(--card);border:1px solid var(--line);border-radius:var(--r-card);box-shadow:var(--sh1);display:flex;flex-direction:column;gap:8px}
.tier.feat{border-color:var(--blue);box-shadow:var(--sh2);position:relative}
.tier.feat .feat-tag{position:absolute;top:-12px;left:50%;transform:translateX(-50%);background:var(--blue);color:#fff;font-size:.72rem;font-weight:700;padding:4px 14px;border-radius:999px}
.tier h3{font-size:1.2rem}
.tier .t-amt{font-size:2.4rem;font-weight:900;letter-spacing:-.04em;margin:6px 0}
.tier .t-amt small{font-size:.9rem;color:var(--muted);font-weight:600}
.tier ul{list-style:none;padding:0;margin:14px 0;display:flex;flex-direction:column;gap:10px}
.tier li{display:flex;gap:9px;font-size:.88rem;color:var(--text)}
.tier li svg{width:16px;height:16px;color:var(--success);flex-shrink:0;margin-top:3px}
.tier .btn{margin-top:auto}

/* ====================== TOASTS ====================== */
#toast-root{position:fixed;top:18px;right:18px;z-index:200;display:flex;flex-direction:column;gap:10px;pointer-events:none}
.toast{display:flex;align-items:center;gap:11px;padding:13px 18px;border-radius:14px;background:var(--card);
  border:1px solid var(--line);box-shadow:var(--sh2);font-size:.9rem;font-weight:550;min-width:240px;max-width:360px;
  transform:translateX(120%);animation:toastIn .4s var(--ease) forwards;pointer-events:auto}
.toast.out{animation:toastOut .35s var(--ease) forwards}
.toast .t-ico{width:22px;height:22px;border-radius:7px;display:grid;place-items:center;flex-shrink:0;color:#fff}
.toast.success .t-ico{background:var(--success)}.toast.error .t-ico{background:var(--danger)}
.toast.info .t-ico{background:var(--blue)}.toast .t-ico svg{width:14px;height:14px}
@keyframes toastIn{to{transform:translateX(0)}}
@keyframes toastOut{to{transform:translateX(120%);opacity:0}}

/* ====================== MODALS ====================== */
#modal-root{position:fixed;inset:0;z-index:150;display:none;align-items:center;justify-content:center;padding:20px}
#modal-root.open{display:flex}
.modal-backdrop{position:absolute;inset:0;background:rgba(8,18,38,.55);backdrop-filter:blur(5px);animation:fadeIn .25s}
.modal{position:relative;background:var(--card);border:1px solid var(--line);border-radius:var(--r-modal);
  box-shadow:var(--sh3);width:100%;max-width:440px;padding:30px;animation:modalIn .32s var(--ease)}
.modal.wide{max-width:880px;max-height:88vh;overflow-y:auto}
@keyframes fadeIn{from{opacity:0}}
@keyframes modalIn{from{opacity:0;transform:translateY(16px) scale(.97)}}
.modal h3{margin-bottom:6px}
.modal .m-close{position:absolute;top:16px;right:16px}

/* ====================== ADMIN ====================== */
.admin-shell{display:grid;grid-template-columns:240px 1fr;min-height:100vh}
.admin-side{background:var(--surface);border-right:1px solid var(--line);padding:20px 14px;position:sticky;top:0;height:100vh;overflow-y:auto;display:flex;flex-direction:column;gap:4px}
.admin-side .as-brand{display:flex;align-items:center;gap:10px;font-weight:900;padding:8px 10px 18px;font-size:1.1rem}
.admin-nav{display:flex;align-items:center;gap:11px;padding:11px 13px;border-radius:11px;cursor:pointer;color:var(--muted);font-weight:550;font-size:.92rem;transition:.16s;border:none;background:none;width:100%;text-align:left}
.admin-nav:hover{background:var(--bg-2);color:var(--text)}
.admin-nav.active{background:rgba(77,163,255,.12);color:var(--blue-ink);font-weight:650}
.admin-nav svg{width:18px;height:18px}
.admin-nav.logout{margin-top:auto;color:var(--danger)}
.admin-main{padding:28px 32px;overflow-y:auto;max-height:100vh}
.admin-topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:26px;gap:16px;flex-wrap:wrap}
.admin-topbar h2{font-size:1.5rem}
.admin-who{display:flex;align-items:center;gap:10px;font-size:.85rem;color:var(--muted)}
.role-chip{background:rgba(77,163,255,.12);color:var(--blue-ink);font-weight:700;font-size:.72rem;padding:3px 10px;border-radius:999px}
.metric-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:28px}
.metric{padding:20px;background:var(--card);border:1px solid var(--line);border-radius:16px}
.metric .m-label{font-size:.78rem;color:var(--muted);font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.metric .m-val{font-size:2rem;font-weight:900;letter-spacing:-.03em}
.metric .m-ico{width:34px;height:34px;border-radius:10px;background:rgba(77,163,255,.12);color:var(--blue-ink);display:grid;place-items:center;margin-left:auto}
.admin-card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:22px;margin-bottom:22px}
.admin-card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;gap:12px;flex-wrap:wrap}
.admin-card-head h3{font-size:1.15rem}
.tbl{width:100%;border-collapse:collapse;font-size:.88rem}
.tbl th{text-align:left;padding:10px 12px;color:var(--faint);font-size:.74rem;text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--line);font-weight:700}
.tbl td{padding:11px 12px;border-bottom:1px solid var(--line);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:var(--bg-2)}
.tbl .row-actions{display:flex;gap:6px;justify-content:flex-end}
.mini-btn{width:32px;height:32px;border-radius:9px;border:1px solid var(--line);background:var(--surface);display:grid;place-items:center;cursor:pointer;color:var(--muted);transition:.15s}
.mini-btn:hover{border-color:var(--blue);color:var(--blue-ink)}
.mini-btn.danger:hover{border-color:var(--danger);color:var(--danger)}
.status-pill{font-size:.72rem;font-weight:700;padding:3px 10px;border-radius:999px;text-transform:capitalize}
.status-active,.status-completed{background:rgba(34,197,94,.14);color:#16a34a}
.status-inactive,.status-rejected{background:rgba(239,68,68,.12);color:#dc2626}
.status-new,.status-reviewing{background:rgba(77,163,255,.14);color:var(--blue-ink)}
.status-in-progress{background:rgba(245,158,11,.16);color:#b45309}
[data-theme="dark"] .status-active,[data-theme="dark"] .status-completed{color:#4ade80}
[data-theme="dark"] .status-inactive,[data-theme="dark"] .status-rejected{color:#f87171}
[data-theme="dark"] .status-in-progress{color:#fbbf24}
.prio{font-size:.7rem;font-weight:700;padding:2px 9px;border-radius:999px;text-transform:capitalize}
.prio-low{background:rgba(120,144,176,.16);color:#64748b}
.prio-normal{background:rgba(77,163,255,.14);color:var(--blue-ink)}
.prio-high{background:rgba(245,158,11,.18);color:#b45309}
.prio-urgent{background:rgba(239,68,68,.16);color:#dc2626}
[data-theme="dark"] .prio-high{color:#fbbf24}[data-theme="dark"] .prio-urgent{color:#f87171}
.editor-grid{display:grid;grid-template-columns:1fr 300px;gap:20px}
.code-area{width:100%;min-height:200px;font-family:ui-monospace,Menlo,monospace;font-size:.86rem;line-height:1.6;
  padding:14px;border-radius:12px;border:1px solid var(--line-2);background:var(--bg-2);color:var(--text);resize:vertical}
.code-area:focus{outline:none;border-color:var(--blue);box-shadow:var(--glow)}

    async deletePack(id){data.packs=data.packs.filter(x=>x.id!==id);save();notify();},
    async saveCategory(c){const i=data.categories.findIndex(x=>x.id===c.id);
      if(i>=0)data.categories[i]=c;else{c.id=c.id||slug(c.name)||uid("cat");data.categories.push(c);}save();notify();return c;},
    async deleteCategory(id){data.categories=data.categories.filter(x=>x.id!==id);save();notify();},
    async saveConfig(c){data.config=c;save();notify();return c;},
    async addRequest(r){r.id=uid("req");r.status="new";r.priority=r.priority||"normal";r.createdAt=Date.now();r.updatedAt=Date.now();r.assignedTo="";r.responsePrompt="";r.notes="";data.customRequests.unshift(r);save();notify();return r;},
    async updateRequest(r){const i=data.customRequests.findIndex(x=>x.id===r.id);if(i>=0){r.updatedAt=Date.now();data.customRequests[i]=r;}save();notify();return r;},
    /* Local checkout emulator — mirrors the Cloud Function (server-authority price
       lookup, order record, gated content delivery). Preview only: no real charge. */
    async checkout(cart,buyer){
      const items=[];let amount=0;const lines=[];
      for(const ci of (cart||[])){
        if(ci.type==="pack"){
          const pk=data.packs.find(x=>x.id===ci.id);if(!pk)continue;
          amount+=pk.price||0;lines.push({id:pk.id,type:"pack",title:pk.title,price:pk.price||0});
          for(const pid of (pk.promptIds||[])){const pr=data.prompts.find(x=>x.id===pid),ct=data.promptContent[pid];
            if(pr&&ct)items.push({id:pr.id,type:"prompt",title:pr.title,categoryId:pr.categoryId,promptText:ct.promptText,variableMeta:ct.variableMeta,packId:pk.id});}
        }else{
          const pr=data.prompts.find(x=>x.id===ci.id),ct=data.promptContent[ci.id];if(!pr||!ct)continue;
          amount+=pr.price||0;lines.push({id:pr.id,type:"prompt",title:pr.title,price:pr.price||0});
          items.push({id:pr.id,type:"prompt",title:pr.title,categoryId:pr.categoryId,promptText:ct.promptText,variableMeta:ct.variableMeta});
        }
      }
      const order={id:uid("ord"),lines,email:(buyer&&buyer.email)||"",amount,currency:"USD",status:"paid",mode:"preview",itemCount:items.length,createdAt:Date.now()};
      data.orders.unshift(order);
      (cart||[]).forEach(ci=>{const arr=ci.type==="pack"?data.packs:data.prompts;const it=arr.find(x=>x.id===ci.id);if(it)it.purchaseCount=(it.purchaseCount||0)+1;});
      save();notify();return {order,items};
    },
    async reset(){Store.del(K);data={prompts:[],packs:[],categories:[],promptContent:{},config:clone(SEED_CONFIG),customRequests:[],orders:[]};save();notify();}
  };
})();

/* Firebase adapter (loaded lazily; mirrors LocalDB interface).
   Kept defensive: if anything fails, app stays on LocalDB. */
async function makeFirebaseDB(){
  const v="10.12.2";
  const app=await import(`https://www.gstatic.com/firebasejs/${v}/firebase-app.js`);
  const fs=await import(`https://www.gstatic.com/firebasejs/${v}/firebase-firestore.js`);
  const au=await import(`https://www.gstatic.com/firebasejs/${v}/firebase-auth.js`);
  const fbApp=app.initializeApp(CONFIG.firebase);
  const db=fs.getFirestore(fbApp); const auth=au.getAuth(fbApp);
  // Best-effort GA4 analytics (measurementId present) — failures are harmless.
  if(CONFIG.firebase.measurementId){import(`https://www.gstatic.com/firebasejs/${v}/firebase-analytics.js`)
    .then(an=>{const a=an.getAnalytics(fbApp);window.__plLog=(name,params)=>{try{an.logEvent(a,name,params||{});}catch(e){}};})
    .catch(()=>{});}
  const cache={prompts:[],packs:[],categories:[],config:clone(SEED_CONFIG),customRequests:[],orders:[]};
  const listeners=new Set(); const notify=()=>listeners.forEach(f=>{try{f();}catch(e){}});
  const col=n=>fs.collection(db,n);
  let ordersUnsub=null;
  // public live listeners (no promptContent — that collection is admin/function-only)
  fs.onSnapshot(col("prompts"),s=>{cache.prompts=s.docs.map(d=>({id:d.id,...d.data()}));notify();});
  fs.onSnapshot(col("packs"),s=>{cache.packs=s.docs.map(d=>({id:d.id,...d.data()}));notify();});
  fs.onSnapshot(col("categories"),s=>{cache.categories=s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(a.order||0)-(b.order||0));notify();});
  fs.onSnapshot(fs.doc(db,"siteConfig","main"),d=>{if(d.exists())cache.config={...cache.config,...d.data()};notify();});
  fs.onSnapshot(col("customRequests"),s=>{cache.customRequests=s.docs.map(d=>({id:d.id,...d.data()}));notify();});
  const pub=p=>{const{promptText,variableMeta,...rest}=p;return rest;};
  return {
    _auth:auth,_au:au,_fs:fs,_db:db,
    async init(){return true;},
    onChange(fn){listeners.add(fn);return()=>listeners.delete(fn);},
    getPrompts(){return cache.prompts;},getPacks(){return cache.packs;},
    getCategories(){return cache.categories;},getConfig(){return cache.config;},
    getRequests(){return cache.customRequests;},getOrders(){return cache.orders;},getPurchases(){return cache.orders;},
    // admin-only orders feed (rules block public reads); started after login
    ensureOrdersSub(){if(ordersUnsub)return;try{ordersUnsub=fs.onSnapshot(col("orders"),s=>{cache.orders=s.docs.map(d=>({id:d.id,...d.data()}));notify();});}catch(e){}},
    async getPromptContent(id){const d=await fs.getDoc(fs.doc(db,"promptContent",id));return d.exists()?d.data():null;},
    async fetchPromptFull(id){const [a,b]=await Promise.all([fs.getDoc(fs.doc(db,"prompts",id)),fs.getDoc(fs.doc(db,"promptContent",id))]);if(!a.exists())return null;const p=a.data();const c=b.exists()?b.data():{promptText:"",variableMeta:{}};return {...p,id,promptText:c.promptText||"",variableMeta:c.variableMeta||{}};},
    async fetchPackFull(id){const d=await fs.getDoc(fs.doc(db,"packs",id));return d.exists()?{...d.data(),id}:null;},
    async getLibrary(uid){const d=await fs.getDoc(fs.doc(db,"libraries",uid));return d.exists()?d.data():null;},
    async saveLibrary(uid,data){await fs.setDoc(fs.doc(db,"libraries",uid),data,{merge:true});return data;},
    async savePrompt(p){
      const id=p.id||uid("p");const hasText=typeof p.promptText==="string";
      const rec={...pub(p),id,updatedAt:Date.now()};
      if(hasText){rec.variables=parseVars(p.promptText);rec.wordCount=p.promptText.trim().split(/\s+/).filter(Boolean).length;}
      await fs.setDoc(fs.doc(db,"prompts",id),rec,{merge:true});
      if(hasText)await fs.setDoc(fs.doc(db,"promptContent",id),{promptText:p.promptText,variableMeta:p.variableMeta||{},id});
      return rec;
    },
    async deletePrompt(id){await fs.deleteDoc(fs.doc(db,"prompts",id));try{await fs.deleteDoc(fs.doc(db,"promptContent",id));}catch(e){}},
    async savePack(p){const id=p.id||uid("pack");await fs.setDoc(fs.doc(db,"packs",id),{...p,id});return p;},
    async deletePack(id){await fs.deleteDoc(fs.doc(db,"packs",id));},
    async saveCategory(c){const id=c.id||slug(c.name);await fs.setDoc(fs.doc(db,"categories",id),{...c,id});return c;},
    async deleteCategory(id){await fs.deleteDoc(fs.doc(db,"categories",id));},
    async saveConfig(c){await fs.setDoc(fs.doc(db,"siteConfig","main"),c);return c;},
    async addRequest(r){const ref=await fs.addDoc(col("customRequests"),{...r,status:"new",priority:r.priority||"normal",createdAt:Date.now(),updatedAt:Date.now(),assignedTo:"",responsePrompt:"",notes:""});return{...r,id:ref.id};},
    async updateRequest(r){await fs.setDoc(fs.doc(db,"customRequests",r.id),{...r,updatedAt:Date.now()});return r;},
    async reset(){}
  };
}

const State={db:LocalDB,admin:null,theme:Store.get("pl_theme")||"light",route:null,local:false};

/* ---------- CART (per-browser, localStorage) ---------- */
const Cart=(()=>{
  const K="pl_cart";const subs=new Set();
  const read=()=>Store.json(K,[]);
  const write=a=>{Store.setJson(K,a);subs.forEach(f=>{try{f();}catch(e){}});};
  return {
    items(){return read();},
    count(){return read().length;},
    has(id,type){return read().some(x=>x.id===id&&x.type===type);},
    add(id,type){const a=read();if(a.some(x=>x.id===id&&x.type===type))return false;a.push({id,type,addedAt:Date.now()});write(a);return true;},
    remove(id,type){write(read().filter(x=>!(x.id===id&&x.type===type)));},
    toggle(id,type){return this.has(id,type)?(this.remove(id,type),false):(this.add(id,type),true);},
    clear(){write([]);},
    onChange(fn){subs.add(fn);return()=>subs.delete(fn);}
  };
})();

/* ── ACCOUNTS ──────────────────────────────────────────────────────────
   Buyers sign in with Firebase Auth (email/password). The single admin
   account (CONFIG.adminEmail) is the owner; every other account is a buyer.
   In the local ?preview sandbox, accounts are emulated in localStorage. */
const Auth=(()=>{
  let user=null,started=false,readyDone=false,resolveReady;
  const readyP=new Promise(r=>resolveReady=r);
  const subs=new Set();
  const notify=()=>subs.forEach(f=>{try{f(user);}catch(e){}});
  const markReady=()=>{if(!readyDone){readyDone=true;resolveReady();}};
  const set=u=>{user=u;notify();};
  const localUser=(email,name)=>({uid:"local_"+slug(email||("u"+Date.now())),email:(email||"").trim(),name:name||""});
  return {
    current(){return user;},
    isAdmin(){return !!user&&(user.email||"").toLowerCase()===(CONFIG.adminEmail||"").toLowerCase();},
    ready(){return readyP;},
    onChange(cb){subs.add(cb);return()=>subs.delete(cb);},
    start(){
      if(started)return;started=true;
      if(!State.local&&State.db&&State.db._au&&State.db._auth){
        try{State.db._au.onAuthStateChanged(State.db._auth,u=>{set(u?{uid:u.uid,email:u.email||"",name:u.displayName||""}:null);markReady();});}
        catch(e){markReady();}
      }else{set(Store.json("pl_user",null));markReady();}
    },
    async signUp(email,pass,name){
      if(!State.local){
        const cred=await State.db._au.createUserWithEmailAndPassword(State.db._auth,(email||"").trim(),pass);
        if(name&&State.db._au.updateProfile){try{await State.db._au.updateProfile(cred.user,{displayName:name});}catch(e){}}
        return cred.user;
      }
      const u=localUser(email,name);Store.setJson("pl_user",u);set(u);return u;
    },
    async signIn(email,pass){
      if(!State.local){const cred=await State.db._au.signInWithEmailAndPassword(State.db._auth,(email||"").trim(),pass);return cred.user;}
      const u=localUser(email);Store.setJson("pl_user",u);set(u);return u;
    },
    async signOut(){
      if(!State.local){try{await State.db._au.signOut(State.db._auth);}catch(e){}}
      else{Store.del("pl_user");set(null);}
    }
  };
})();
/* Per-account Library. Firebase: a libraries/{uid} document (syncs across
   devices). Local sandbox: localStorage keyed by the emulated uid. */
const Library=(()=>{
  let cache=[]; const subs=new Set();
  const notify=()=>subs.forEach(f=>{try{f();}catch(e){}});
  const key=()=>{const u=Auth.current();return "pl_lib_"+(u?u.uid:"anon");};
  return {
    items(){return cache;},
    has(id){return cache.some(x=>x.id===id);},
    get(id){return cache.find(x=>x.id===id)||null;},
    onChange(cb){subs.add(cb);return()=>subs.delete(cb);},
    async reload(){
      const u=Auth.current();
      if(!u){cache=[];notify();return cache;}
      if(!State.local){try{const d=await State.db.getLibrary(u.uid);cache=(d&&Array.isArray(d.items))?d.items:[];}catch(e){cache=[];}}
      else{cache=Store.json(key(),[]);}
      notify();return cache;
    },
    async addDelivered(order,items){
      const u=Auth.current();if(!u)return;
      const map=new Map(cache.map(x=>[x.id,x]));
      (items||[]).forEach(it=>{map.set(it.id,{...it,orderId:order.id,purchasedAt:order.createdAt||Date.now()});});
      cache=[...map.values()].sort((a,b)=>(b.purchasedAt||0)-(a.purchasedAt||0));
      if(!State.local){try{await State.db.saveLibrary(u.uid,{items:cache,updatedAt:Date.now()});}catch(e){}}
      else{Store.setJson(key(),cache);}
      notify();
    }
  };
})();

function toast(msg,type="success",ms=3200){

  t.innerHTML=`<span class="t-ico">${icon(ic)}</span><span>${esc(msg)}</span>`;
  root.appendChild(t);setTimeout(()=>{t.classList.add("out");setTimeout(()=>t.remove(),360);},ms);
}

function authErrMsg(e,m){
  const c=((e&&(e.code||e.message))||"").toString();
  if(/email-already-in-use/.test(c))return "That email already has an account — try logging in instead.";
  if(/invalid-email/.test(c))return "That doesn't look like a valid email address.";
  if(/weak-password/.test(c))return "Password is too weak — use at least 6 characters.";
  if(/wrong-password|invalid-credential|user-not-found|invalid-login/.test(c))return "Wrong email or password.";
  if(/too-many-requests/.test(c))return "Too many attempts — please wait a moment and try again.";
  if(/network/.test(c))return "Network error — check your connection and try again.";
  return "Something went wrong. Please try again.";
}
function openAuthModal(mode,after){
  mode=mode||"signup";
  openModal(`<div class="modal-head"><h2 id="authTitle" style="margin:0">Create your account</h2>
    <button class="icon-btn" data-close aria-label="Close">${icon("close")}</button></div>
    <div class="auth-tabs"><button class="auth-tab" data-am="signup">Create account</button><button class="auth-tab" data-am="login">Log in</button></div>
    <div id="authForm"></div>`);
  const draw=m=>{
    $("#authTitle").textContent=m==="signup"?"Create your account":"Welcome back";
    $$(".auth-tab").forEach(t=>t.classList.toggle("active",t.dataset.am===m));
    $("#authForm").innerHTML=`
      ${m==="signup"?`<div class="form-field"><label>Name</label><input id="au_name" placeholder="Your name" autocomplete="name"></div>`:""}
      <div class="form-field"><label>Email</label><input id="au_email" type="email" placeholder="you@email.com" autocomplete="email"></div>
      <div class="form-field"><label>Password</label><input id="au_pass" type="password" placeholder="${m==="signup"?"At least 6 characters":"Your password"}" autocomplete="${m==="signup"?"new-password":"current-password"}"></div>
      <div class="auth-err hide" id="au_err"><p></p></div>
      <button class="btn btn-primary btn-block btn-lg" id="au_go" style="margin-top:4px">${m==="signup"?"Create account":"Log in"}</button>
      <p class="muted center" style="font-size:.8rem;margin:12px 0 0">${m==="signup"?"Already have an account? ":"New to PromptLab? "}<a href="#" id="au_swap" style="color:var(--blue-ink);font-weight:600">${m==="signup"?"Log in":"Create one"}</a></p>
      <p class="muted center" style="font-size:.72rem;margin:8px 0 0">Your purchases save to your account so you can reach them on any device.</p>`;
    const go=$("#au_go"),err=$("#au_err");
    const fail=msg=>{err.querySelector("p").textContent=msg;err.classList.remove("hide");};
    $("#au_swap").onclick=e=>{e.preventDefault();draw(m==="signup"?"login":"signup");};
    $("#au_email").addEventListener("keydown",e=>{if(e.key==="Enter")go.click();});
    $("#au_pass").addEventListener("keydown",e=>{if(e.key==="Enter")go.click();});
    go.onclick=async()=>{
      const email=($("#au_email").value||"").trim(),pass=$("#au_pass").value,name=(($("#au_name")||{}).value||"").trim();
      err.classList.add("hide");
      if(!email||!pass){fail("Enter your email and password.");return;}
      if(m==="signup"&&pass.length<6){fail("Password must be at least 6 characters.");return;}
      go.disabled=true;go.textContent="Please wait…";
      try{
        if(m==="signup")await Auth.signUp(email,pass,name);else await Auth.signIn(email,pass);
        await Auth.ready();
        closeModal();toast(m==="signup"?"Account created — you're all set.":"Welcome back.","success");
        if(typeof after==="function")after();
      }catch(e){go.disabled=false;go.textContent=m==="signup"?"Create account":"Log in";fail(authErrMsg(e,m));}
    };
  };
  $$(".auth-tab").forEach(t=>t.onclick=()=>draw(t.dataset.am));
  draw(mode);
}

/* ========================= SECURE CHECKOUT + ANALYTICS =========================
   Payment + delivery are server-authoritative:
   • Local preview  → State.db.checkout() emulates the Cloud Function (no real charge).
   • Production      → Square Web Payments SDK tokenizes the card (PCI-safe), then the
                       Cloud Function (CONFIG.checkoutFunctionUrl) re-prices server-side,
                       charges Square, records the order, and returns the prompt content.
   The browser never sets the price and never receives prompt text before payment. */
const paymentsConfigured=()=>!!(FIREBASE_ENABLED&&CONFIG.checkoutFunctionUrl&&CONFIG.square.appId&&CONFIG.square.locationId);

async function processCheckout(cart,buyer,sourceId){
  if(!cart||!cart.length)throw new Error("Your cart is empty.");
  if(!State.local){
    if(!CONFIG.checkoutFunctionUrl)throw new Error("Payments are not configured yet.");
    const res=await fetch(CONFIG.checkoutFunctionUrl,{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({items:cart.map(c=>({id:c.id,type:c.type})),buyerEmail:(buyer&&buyer.email)||"",sourceId,idempotencyKey:uid("idem")})});
    if(!res.ok){let m="Payment failed.";try{m=(await res.json()).error||m;}catch(e){}throw new Error(m);}
    return await res.json(); // {order, items:[{id,title,promptText,variableMeta,...}]}
  }
  return await State.db.checkout(cart,buyer); // preview emulator
}
/* Client-side delivery for SIMPLE Square-link mode (no backend): after the buyer
   pays on Square and returns, expand their cart into full prompts + record locally.
   Note: this path needs promptContent readable (see SETUP rules). The Cloud Function
   path keeps content fully locked and verifies payment server-side. */
async function buildDelivery(cart,buyer){
  const items=[],lines=[];let amount=0;
  const addPrompt=async(pid,packId)=>{
    const pr=promptById(pid);if(!pr)return;
    const ct=(await State.db.getPromptContent(pid))||{promptText:"",variableMeta:{}};
    items.push({id:pr.id,type:"prompt",title:pr.title,categoryId:pr.categoryId,promptText:ct.promptText,variableMeta:ct.variableMeta,...(packId?{packId}:{})});
  };
  for(const ci of (cart||[])){
    if(ci.type==="pack"){const pk=packById(ci.id);if(!pk)continue;
      amount+=pk.price||0;lines.push({id:pk.id,type:"pack",title:pk.title,price:pk.price||0});
      for(const pid of (pk.promptIds||[]))await addPrompt(pid,pk.id);
    }else{const pr=promptById(ci.id);if(!pr)continue;
      amount+=pr.price||0;lines.push({id:pr.id,type:"prompt",title:pr.title,price:pr.price||0});
      await addPrompt(ci.id,null);
    }
  }
  const order={id:uid("ord"),lines,email:(buyer&&buyer.email)||"",amount,currency:"USD",status:"paid",mode:"square-link",itemCount:items.length,createdAt:Date.now()};
  return {order,items};
}

  try{if(window.__plLog)window.__plLog(event,params);else if(FIREBASE_ENABLED&&window.gtag)window.gtag("event",event,params);}catch(e){}
  const k="pl_events";const q=Store.json(k,[]);q.push({event,params,t:Date.now()});Store.setJson(k,q.slice(-500));
}

function buildSuggest(raw){
  const box=$("#searchSuggest");if(!box)return;

  if(!q){items=recentSearches().map(x=>({label:x,cat:"recent",q:x}));}

    items=State.db.getPrompts().filter(p=>p.status==="active"&&p.title.toLowerCase().includes(q)).slice(0,5).map(p=>({label:p.title,cat:catName(p.categoryId),q:p.title}));
    cats().filter(c=>c.name.toLowerCase().includes(q)).slice(0,2).forEach(c=>items.push({label:c.name,cat:"category",q:c.name}));
  }
  if(!items.length){box.classList.add("hide");return;}
  box.innerHTML=items.map(it=>`<button data-sg="${esc(it.q)}">${icon(it.cat==="recent"?"clock":"search")}<span>${esc(it.label)}</span><span class="ss-cat">${esc(it.cat)}</span></button>`).join("")
    +(!q&&recentSearches().length?`<button data-sgclear style="color:var(--danger)">${icon("trash")}<span>Clear recent searches</span></button>`:"");
  box.classList.remove("hide");
}

function browseFilterHandler(e){
  const t=e.target;let changed=false;
  if(t.classList.contains("f-cat")){toggle(BS.cat,t.value,t.checked);changed=true;}
  else if(t.classList.contains("f-diff")){toggle(BS.diff,t.value,t.checked);changed=true;}
  else if(t.classList.contains("f-ai")){toggle(BS.ai,t.value,t.checked);changed=true;}
  else if(t.classList.contains("f-type")){toggle(BS.type,t.value,t.checked);changed=true;}
  else if(t.classList.contains("f-flag")){toggle(BS.flags,t.value,t.checked);changed=true;}
  else if(t.classList.contains("f-price")){BS.priceMax=+t.value;$$(".f-price-lbl").forEach(l=>l.textContent=money(BS.priceMax));changed=true;}
  else if(t.id==="resetFilters"){BS.cat.clear();BS.diff.clear();BS.ai.clear();BS.type.clear();BS.flags.clear();BS.priceMax=50;BS.q="";const s=$("#browseSearch");if(s)s.value="";changed=true;}
  if(changed){BS.shown=BATCH;applyBrowse();syncFilterDom();}
}
function toggle(set,v,on){on?set.add(v):set.delete(v);}
function syncFilterDom(){
  $$(".f-cat").forEach(c=>c.checked=BS.cat.has(c.value));
  $$(".f-diff").forEach(c=>c.checked=BS.diff.has(c.value));
  $$(".f-ai").forEach(c=>c.checked=BS.ai.has(c.value));
  $$(".f-type").forEach(c=>c.checked=BS.type.has(c.value));
  $$(".f-flag").forEach(c=>c.checked=BS.flags.has(c.value));
  $$(".f-price").forEach(c=>c.value=BS.priceMax);
}
function browseItems(){
  const wantPrompt=BS.type.size===0||BS.type.has("prompt");
  const wantPack=BS.type.size===0||BS.type.has("pack");
  const restrictsPrompt=BS.diff.size||BS.ai.size; // packs excluded if these set
  let items=[];
  if(wantPrompt){
    items=items.concat(State.db.getPrompts().filter(p=>p.status==="active").map(p=>({...p,_kind:"prompt"})));
  }
  if(wantPack&&!restrictsPrompt){
    items=items.concat(State.db.getPacks().map(p=>({...p,_kind:"pack",difficulty:p.difficulty||"medium",popularityScore:p.popularityScore||(p.purchaseCount||0)})));
  }
  items=items.filter(it=>{
    if(BS.cat.size&&!BS.cat.has(it.categoryId))return false;
    if(it.price>BS.priceMax)return false;
    if(BS.flags.has("featured")&&!it.featured)return false;
    if(BS.flags.has("free")&&!BS.flags.has("premium")&&it.price!==0)return false;
    if(BS.flags.has("premium")&&!BS.flags.has("free")&&it.price<=0)return false;
    if(it._kind==="prompt"){
      if(BS.diff.size&&!BS.diff.has(it.difficulty))return false;
      if(BS.ai.size&&!(it.aiCompatibility||[]).some(a=>BS.ai.has(a)||(a!=="ChatGPT"&&a!=="Claude"&&a!=="Gemini"&&BS.ai.has("Other"))))return false;
    }
    if(BS.q){
      const hay=(it.title+" "+(it.description||"")+" "+(it.tags||[]).join(" ")+" "+((it.variables||[]).join(" "))).toLowerCase();
      if(!hay.includes(BS.q))return false;
    }
    return true;
  });
  const maxPc=Math.max(1,...items.map(i=>i.purchaseCount||0));
  const now=Date.now();
  const score=it=>{
    const pc=(it.purchaseCount||0)/maxPc;const pop=(it.popularityScore||0)/100;
    const feat=it.featured?1:0;const rec=1-Math.min(1,(now-(it.createdAt||now))/(1000*60*60*24*120));
    return .35*pc+.25*pop+.15*feat+.15*rec+.10*pc;
  };
  switch(BS.sort){
    case"newest":items.sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));break;
    case"oldest":items.sort((a,b)=>(a.createdAt||0)-(b.createdAt||0));break;
    case"updated":items.sort((a,b)=>(b.updatedAt||b.createdAt||0)-(a.updatedAt||a.createdAt||0));break;
    case"alpha":items.sort((a,b)=>a.title.localeCompare(b.title));break;
    case"price-asc":items.sort((a,b)=>a.price-b.price);break;
    case"price-desc":items.sort((a,b)=>b.price-a.price);break;
    case"popular":items.sort((a,b)=>(b.popularityScore||0)-(a.popularityScore||0));break;
    case"engagement":items.sort((a,b)=>(b.purchaseCount||0)-(a.purchaseCount||0));break;
    default:items.sort((a,b)=>score(b)-score(a));
  }
  return items;
}
function applyBrowse(){
  const all=browseItems();
  const grid=$("#browseGrid");if(!grid)return;
  $("#resultCount").innerHTML=`<b>${all.length}</b> result${all.length===1?"":"s"}`;
  if(_browseIO)_browseIO.disconnect();
  if(!all.length){
    grid.innerHTML=`<div class="empty-state"><div class="es-ico">${icon("search")}</div>
      <h3>No prompts match your filters</h3><p>Try removing a filter or searching for something broader.</p>
      <button class="btn btn-secondary" id="resetFilters">Reset filters</button></div>`;return;
  }
  const slice=all.slice(0,BS.shown);
  const more=BS.shown<all.length;
  grid.innerHTML=slice.map(it=>it._kind==="pack"?packCard(it):promptCard(it)).join("")
    +(more?skeletonCards(Math.min(3,all.length-BS.shown))+`<div class="load-more-sentinel" id="moreSentinel" style="height:1px;padding:0"></div>`:"");
  observeReveals();
  const sentinel=$("#moreSentinel");
  if(sentinel){
    _browseIO=new IntersectionObserver(es=>{if(es[0].isIntersecting){BS.shown+=BATCH;applyBrowse();}},{rootMargin:"400px"});
    _browseIO.observe(sentinel);
  }
}

function highlightPrompt(text,values){
  return esc(text).replace(/\[([^\]\n]{1,40})\]/g,(m,name)=>{
    const key=name.trim().toLowerCase();const v=values&&values[key];
    return `<span class="vv${v?" filled":""}" data-v="${esc(key)}">[${esc(v||name.trim())}]</span>`;
  });
}
function applyVars(text,values){
  return text.replace(/\[([^\]\n]{1,40})\]/g,(m,name)=>{const v=values[name.trim().toLowerCase()];return v||m;});
}
function relatedPrompts(p){
  const tagsA=new Set((p.tags||[]).map(t=>t.toLowerCase()));
  return State.db.getPrompts().filter(x=>x.id!==p.id&&x.status==="active").map(x=>{
    const cat=x.categoryId===p.categoryId?1:0;
    const overlap=(x.tags||[]).filter(t=>tagsA.has(t.toLowerCase())).length/Math.max(1,tagsA.size);
    const pop=(x.popularityScore||0)/100;
    return {x,s:.5*cat+.3*overlap+.2*pop};
  }).sort((a,b)=>b.s-a.s).slice(0,3).map(o=>o.x);
}

function checkoutLink(item,type){try{
  if(item&&item.checkoutUrl&&item.checkoutUrl.trim())return item.checkoutUrl.trim();
  const sq=cfg().square||{};
  if(type==="pack"&&sq.packCheckoutUrl&&sq.packCheckoutUrl.trim())return sq.packCheckoutUrl.trim();
  if(type==="prompt"&&sq.promptCheckoutUrl&&sq.promptCheckoutUrl.trim())return sq.promptCheckoutUrl.trim();
  return ((sq.defaultCheckoutUrl)||CONFIG.square.checkoutUrl||"").trim();
}catch(e){return ((item&&item.checkoutUrl)||CONFIG.square.checkoutUrl||"").trim();}}

function mdInline(s){return esc(s).replace(/\*\*([^*]+)\*\*/g,"<b>$1</b>").replace(/_([^_]+)_/g,"<i>$1</i>").replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2">$1</a>');}
function mdLite(s){
  const lines=String(s||"").split("\n");let html="",inList=false;
  const close=()=>{if(inList){html+="</ul>";inList=false;}};
  lines.forEach(raw=>{const line=raw.trim();
    if(!line){close();return;}
    if(line.startsWith("## ")){close();html+="<h2>"+mdInline(line.slice(3))+"</h2>";}
    else if(line.startsWith("- ")){if(!inList){html+="<ul>";inList=true;}html+="<li>"+mdInline(line.slice(2))+"</li>";}
    else{close();html+="<p>"+mdInline(line)+"</p>";}});
  close();return html;
}
const LEGAL_TITLES={privacy:"Privacy Policy",terms:"Terms of Service",cookies:"Cookie Policy",refunds:"Refund Policy",dmca:"DMCA Policy","acceptable-use":"Acceptable Use Policy",disclaimer:"AI Disclaimer",accessibility:"Accessibility Statement"};
function renderLegal(doc){

function loadSquareSdk(){return new Promise((res,rej)=>{
  if(window.Square)return res(window.Square);
  const s=document.createElement("script");s.src="https://web.squarecdn.com/v1/square.js";
  s.onload=()=>window.Square?res(window.Square):rej(new Error("Square unavailable"));
  s.onerror=()=>rej(new Error("Square SDK failed to load"));document.head.appendChild(s);});}
async function completeOrder(items,buyer,sourceId,btn){
  const restore=btn?btn.innerHTML:"";
  if(btn){btn.disabled=true;btn.innerHTML=`${icon("bolt")} Processing…`;}
  try{
    const res=await processCheckout(items,buyer,sourceId);
    if(!res||!res.order)throw new Error("No confirmation returned.");
    await Library.addDelivered(res.order,res.items||[]);
    try{sessionStorage.setItem("pl_last_order",JSON.stringify({order:res.order,items:(res.items||[]).map(i=>({id:i.id,title:i.title,type:i.type}))}));}catch(e){}
    track("purchase",{amount:res.order.amount,items:(res.items||[]).length});
    Cart.clear();location.hash="#/success";
  }catch(e){toast(e.message||"Checkout failed.","error");if(btn){btn.disabled=false;btn.innerHTML=restore;}}
}
/* Payment surface for an explicit list of `items`. Pass the single product as `item`
   so we can use that product's own Square link. Drives Buy-now (one item) today, and
   still works for the dormant multi-item cart if it's ever re-enabled. */
function mountCheckout(items,subtotal,item){
  const area=$("#checkoutArea");if(!area)return;
  const getBuyer=()=>({email:(($("#buyerEmail")||{}).value||"").trim()});
  // 1) Local sandbox → built-in emulator (no real charge)
  if(State.local){
    area.innerHTML=`<button class="btn btn-primary btn-block btn-lg" id="payBtn" style="margin-top:4px">${icon("bolt")} Complete order — ${money(subtotal)}</button>
      <p class="muted center" style="font-size:.74rem;margin:8px 0 0">Local preview — no real charge. Connect Square for live payments.</p>`;
    $("#payBtn").onclick=()=>completeOrder(items,getBuyer(),null,$("#payBtn"));return;
  }
  // 2) ADVANCED: Cloud Function + Web Payments SDK (in-page card, server-verified)
  if(paymentsConfigured()){
    area.innerHTML=`<div id="sqCard" style="margin:12px 0;min-height:48px"></div>
      <button class="btn btn-primary btn-block btn-lg" id="payBtn" disabled>${icon("lock")} Pay ${money(subtotal)}</button>`;
    const payBtn=$("#payBtn");
    loadSquareSdk().then(async Sq=>{
      try{
        const payments=Sq.payments(CONFIG.square.appId,CONFIG.square.locationId);
        const card=await payments.card();await card.attach("#sqCard");payBtn.disabled=false;
        payBtn.onclick=async()=>{payBtn.disabled=true;
          try{const r=await card.tokenize();
            if(r.status==="OK")await completeOrder(items,getBuyer(),r.token,payBtn);
            else{toast("Please check your card details.","error");payBtn.disabled=false;}
          }catch(e){toast("Payment error. Try again.","error");payBtn.disabled=false;}};
      }catch(e){area.innerHTML=`<div class="admin-banner">${icon("lock")} Could not start Square — verify appId/locationId.</div>`;}
    }).catch(()=>{area.innerHTML=`<div class="admin-banner">${icon("lock")} Square SDK failed to load.</div>`;});
    return;
  }
  // 3) SIMPLE (default): Square hosted checkout link — no backend needed
  const types=[...new Set((items||[]).map(i=>i.type))];
  const oneType=types.length===1?types[0]:undefined;   // Buy-now is always single-type
  const link=checkoutLink(item,oneType);
  if(link){
    area.innerHTML=`<button class="btn btn-primary btn-block btn-lg" id="payBtn">${icon("cart")} Pay with Square — ${money(subtotal)}</button>
      <p class="muted center" style="font-size:.74rem;margin:8px 0 0">You'll pay securely on Square, then come right back here and your prompt unlocks automatically.</p>`;
    $("#payBtn").onclick=async()=>{
      const btn=$("#payBtn");btn.disabled=true;btn.innerHTML=`${icon("bolt")} Preparing…`;
      const buyer={email:getBuyer().email||((Auth.current()||{}).email)||""};
      // Fetch the full purchase NOW (while the page + session are live), stash it,
      // then redirect. On return we just persist it — no dependency on a fresh reload.
      try{
        const delivery=await buildDelivery(items,buyer);
        sessionStorage.setItem("pl_pending_delivery",JSON.stringify(delivery));
      }catch(e){try{sessionStorage.setItem("pl_pending_delivery",JSON.stringify({order:{id:uid("ord"),lines:[],email:buyer.email,amount:subtotal,status:"paid",mode:"square-link",createdAt:Date.now()},items:[],cart:items}));}catch(_){}}
      track("checkout_redirect",{amount:subtotal,items:items.length});
      window.location.href=link;
    };return;
  }
  // 4) Nothing configured yet
  area.innerHTML=`<div class="admin-banner" style="margin-top:10px">${icon("lock")} Almost there — add a Square payment link for this item in its editor (or a default in Site Config → Payments), or set <code>CONFIG.square.checkoutUrl</code> (SETUP.md).</div>`;
}

/* ========================= ROUTER ========================= */
function router(){
  const raw=location.hash.replace(/^#\/?/,"");
  const [path,queryStr]=raw.split("?");
  const seg=path.split("/").filter(Boolean);
  const q=new URLSearchParams(queryStr||"");
  State.route=path;closeModal();setJsonLd(null);setPageMeta(null);
  const a=seg[0]||"";
  try{
    if(a==="")renderHome();
    else if(a==="browse")renderBrowse();
    else if(a==="categories")renderCategories();
    else if(a==="category")renderBrowse({cat:seg[1]});
    else if(a==="packs")renderPacks();
    else if(a==="pack")renderPack(seg[1]);
    else if(a==="prompt")renderPrompt(seg[1]);
    else if(a==="custom")renderCustom();
    else if(a==="pricing")renderPricing();
    else if(a==="cart")renderCart();
    else if(a==="checkout")renderCheckout(seg[1],seg[2]);
    else if(a==="library")renderLibrary();
    else if(a==="about")renderAbout();
    else if(a==="faq")renderFaq();
    else if(a==="contact")renderContact();
    else if(a==="legal")renderLegal(seg[1]);
    else if(a==="success")renderSuccess(q);
    else if(a==="admin")renderAdminRoute();
    else renderNotFound();
  }catch(err){console.error(err);renderNotFound("Something went wrong loading this page.");}
  setActiveNav();
}

      aiCompatibility:$$(".e_ai").filter(c=>c.checked).map(c=>c.value),previewOutput:$("#e_out").value.trim(),variableMeta:cleanMeta,

function adminAnalytics(){

  const maxPc=Math.max(1,...prompts.map(p=>p.purchaseCount||0));
  const catCounts=allCats().map(c=>({name:c.name,n:State.db.getPrompts().filter(p=>p.categoryId===c.id).length})).filter(x=>x.n).sort((a,b)=>b.n-a.n).slice(0,6);
  const maxCat=Math.max(1,...catCounts.map(c=>c.n));
  const metric=(l,v,ic)=>`<div class="metric"><div class="m-label">${icon(ic)} ${l}</div><div class="m-val">${v}</div></div>`;
  return `${adminTop("Analytics")}
    <div class="metric-grid">
      ${metric("Prompt views",count("prompt_view"),"sparkles")}
      ${metric("Prompt copies",count("prompt_copy"),"copy")}
      ${metric("Checkout clicks",count("prompt_purchase_click")+count("pack_purchase_click"),"cart")}
      ${metric("Custom requests",count("custom_request_submit"),"mail")}</div>
    <div class="admin-card"><div class="admin-card-head"><h3>Conversion funnel</h3><span class="muted" style="font-size:.8rem">this browser</span></div>
      ${(()=>{const vw=count("prompt_view"),cp=count("prompt_copy"),ck=count("prompt_purchase_click")+count("pack_purchase_click"),rq=count("custom_request_submit");
        const stages=[["Prompt views",vw,"var(--blue)"],["Customized / copied",cp,"var(--blue-2)"],["Checkout clicks",ck,"#22c55e"],["Custom requests",rq,"#f59e0b"]];
        const fmax=Math.max(1,vw,cp,ck,rq);
        return `<div style="display:flex;flex-direction:column;gap:10px">${stages.map(([l,n,c])=>`<div style="display:flex;align-items:center;gap:12px">
          <span style="min-width:140px;font-size:.84rem;color:var(--muted)">${l}</span>
          <div style="flex:1;background:var(--line);border-radius:8px;height:26px;overflow:hidden"><div style="width:${Math.max(5,n/fmax*100)}%;height:100%;background:${c};border-radius:8px;display:flex;align-items:center;padding:0 10px;color:#fff;font-weight:700;font-size:.78rem">${n}</div></div>
          <span style="min-width:44px;text-align:right;font-size:.8rem;font-weight:700">${vw?Math.round(n/vw*100):0}%</span></div>`).join("")}</div>`;})()}</div>
    <div class="admin-card"><div class="admin-card-head"><h3>Top prompts by purchases</h3></div>
      <div class="bar-chart">${prompts.map(p=>`<div class="bar" style="height:${Math.max(6,(p.purchaseCount||0)/maxPc*140)}px"><b>${p.purchaseCount||0}</b><span>${esc(p.title.split(" ").slice(0,2).join(" "))}</span></div>`).join("")}</div></div>
    <div class="admin-card"><div class="admin-card-head"><h3>Prompts by category</h3></div>
      <div class="bar-chart">${catCounts.map(c=>`<div class="bar" style="height:${Math.max(6,c.n/maxCat*140)}px;background:linear-gradient(180deg,var(--blue-2),var(--blue))"><b>${c.n}</b><span>${esc(c.name.split(" ")[0])}</span></div>`).join("")}</div></div>
    <div class="admin-card"><div class="admin-card-head"><h3>Activity heatmap</h3><span class="muted" style="font-size:.8rem">by day & hour</span></div>
      ${(()=>{const days=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
        const grid=Array.from({length:7},()=>new Array(24).fill(0));
        events.forEach(e=>{const d=new Date(e.t||Date.now());const day=(d.getDay()+6)%7;grid[day][d.getHours()]++;});
        const hmax=Math.max(1,...grid.flat());
        const hours=[0,3,6,9,12,15,18,21];
        return `<div style="overflow-x:auto"><div class="heatmap" style="min-width:560px">
          <span></span>${Array.from({length:24},(_,h)=>`<span class="hm-h">${hours.includes(h)?h:""}</span>`).join("")}
          ${grid.map((row,di)=>`<span class="hm-day">${days[di]}</span>${row.map(v=>{const a=v?(.15+.85*v/hmax).toFixed(2):0;
            return `<span class="hm-cell" title="${days[di]} ${"·"} ${v} events" style="${v?`background:rgba(77,163,255,${a})`:""}"></span>`;}).join("")}`).join("")}
        </div></div>
        <div class="row" style="gap:8px;align-items:center;margin-top:12px;font-size:.74rem;color:var(--faint)">Less
          <span style="display:inline-flex;gap:3px">${[.15,.4,.65,.9,1].map(a=>`<span style="width:14px;height:14px;border-radius:3px;background:rgba(77,163,255,${a})"></span>`).join("")}</span>More
          <span style="margin-left:auto">${events.length} total events</span></div>`;})()}</div>
    <p class="muted" style="font-size:.82rem">${FIREBASE_ENABLED?"Connect Firebase Analytics / gtag for server-side funnels and cohorts. Charts above reflect live engagement events.":"Local preview metrics are computed from this browser's event log."}</p>`;
}

    <div class="setup-actions">
      <button class="btn btn-primary btn-lg" id="setupReload">${icon("bolt")} I've added my config — reload</button>
      <button class="btn btn-secondary btn-lg" id="enterPreview">Preview the storefront locally →</button>
    </div>
    <p class="setup-fine">Local preview runs on this browser only (data isn't shared between visitors) — useful for design and demos, not for a live store.</p>
  </div></div>`;
  $("#setupReload").onclick=()=>location.reload();
  $("#enterPreview").onclick=()=>{try{sessionStorage.setItem("pl_preview","1");}catch(e){}startApp();};
}
async function startApp(){
  Auth.onChange(()=>{
    State.user=Auth.current();
    if(!State.local)State.admin=Auth.isAdmin()?{name:"Owner",role:"owner",email:(State.user||{}).email,loginAt:Date.now()}:null;
    Library.reload().then(()=>{
      renderNavAccount();
      const r=State.route||"";
      if(r.indexOf("checkout")===0||r==="library")router();
    });
  });
  Auth.start();
  buildShell();
  if(!location.hash)location.hash="#/";
  router();
  window.addEventListener("hashchange",router);
  State.db.onChange(debounce(()=>{const r=State.route||"";
    if(r.startsWith("browse")||r.startsWith("category")||r.startsWith("admin"))return;router();},150));
}
async function boot(){
  applyTheme(State.theme);
  let preview=false;try{preview=sessionStorage.getItem("pl_preview")==="1";}catch(e){}
  // Design-preview override: ?preview=1 (or localStorage pl_force_local) runs the
  // storefront on the local sandbox even when Firebase is configured — handy for
  // previewing UI without touching production data.
  let forceLocal=false;try{forceLocal=/[?&]preview=1\b/.test(location.href)||localStorage.getItem("pl_force_local")==="1";}catch(e){}
  if(FIREBASE_ENABLED && !forceLocal){
    try{State.db=await makeFirebaseDB();await State.db.init();State.local=false;}
    catch(e){console.error("Firebase failed to initialize. Check your CONFIG.firebase values and that Firestore + Auth are enabled.",e);renderSetup();return;}
    return startApp();
  }
  // No Firebase (or forced local).
  if(!preview && !forceLocal){renderSetup();return;}
  State.local=true;
  await State.db.init();           // local sandbox (this browser only)
  startApp();
}
boot();

</script>
</body>
</html>
